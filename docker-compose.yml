services:

  db:
    image: postgres:16
    container_name: AI_SAAS
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: RANGEROVER
      POSTGRES_DB: ai_saas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis
    container_name: redis
    ports:
      - "6381:6379"
    networks:
      - app_network


  backend:
    build: .
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


  frontend:
    build: ./frontent/lumina
    container_name: frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontent/lumina/.env
    networks:
      - app_network
    depends_on:
      - backend
  

  
  

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: